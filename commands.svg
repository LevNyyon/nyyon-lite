<svg viewBox="0 0 1120 440" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="c" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#0A0A0A"/>
    </marker>
  </defs>
  <rect width="1120" height="440" fill="#FAFAF9"/>

  <text x="48" y="52" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" letter-spacing="2.5" fill="#78716C">ONE COMMAND PER LAYER</text>
  <text x="48" y="80" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#57534E">Type it. You get the recipe, registered and validated.</text>

  <!-- /nyyon-gateways -->
  <rect x="48" y="113" width="252" height="37" rx="9" fill="#F3F0FE" stroke="#6C5CE7" stroke-opacity="0.35"/>
  <text x="66" y="138" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#6C5CE7">/nyyon-gateways</text>
  <line x1="320" y1="130" x2="356" y2="130" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#c)"/>
  <text x="372" y="138" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="17" fill="#0A0A0A"><tspan font-weight="700">Gateway</tspan><tspan dx="14" fill="#78716C">wire one external service</tspan></text>

  <!-- /nyyon-tools -->
  <rect x="48" y="165" width="252" height="37" rx="9" fill="#F3F0FE" stroke="#6C5CE7" stroke-opacity="0.35"/>
  <text x="66" y="190" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#6C5CE7">/nyyon-tools</text>
  <line x1="320" y1="182" x2="356" y2="182" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#c)"/>
  <text x="372" y="190" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="17" fill="#0A0A0A"><tspan font-weight="700">Tool</tspan><tspan dx="14" fill="#78716C">one job, in the shared pool</tspan></text>

  <!-- /nyyon-workflows -->
  <rect x="48" y="217" width="252" height="37" rx="9" fill="#F3F0FE" stroke="#6C5CE7" stroke-opacity="0.35"/>
  <text x="66" y="242" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#6C5CE7">/nyyon-workflows</text>
  <line x1="320" y1="234" x2="356" y2="234" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#c)"/>
  <text x="372" y="242" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="17" fill="#0A0A0A"><tspan font-weight="700">Workflow</tspan><tspan dx="14" fill="#78716C">order existing tools, no logic</tspan></text>

  <!-- /nyyon-modules -->
  <rect x="48" y="269" width="252" height="37" rx="9" fill="#F3F0FE" stroke="#6C5CE7" stroke-opacity="0.35"/>
  <text x="66" y="294" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#6C5CE7">/nyyon-modules</text>
  <line x1="320" y1="286" x2="356" y2="286" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#c)"/>
  <text x="372" y="294" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="17" fill="#0A0A0A"><tspan font-weight="700">Module</tspan><tspan dx="14" fill="#78716C">a product area with its own screen</tspan></text>

  <!-- /nyyon-surfaces -->
  <rect x="48" y="321" width="252" height="37" rx="9" fill="#F3F0FE" stroke="#6C5CE7" stroke-opacity="0.35"/>
  <text x="66" y="346" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#6C5CE7">/nyyon-surfaces</text>
  <line x1="320" y1="338" x2="356" y2="338" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#c)"/>
  <text x="372" y="346" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="17" fill="#0A0A0A"><tspan font-weight="700">Surface</tspan><tspan dx="14" fill="#78716C">another page for an existing module</tspan></text>

  <!-- /nyyon-knowledge -->
  <rect x="48" y="373" width="252" height="37" rx="9" fill="#F3F0FE" stroke="#6C5CE7" stroke-opacity="0.35"/>
  <text x="66" y="398" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#6C5CE7">/nyyon-knowledge</text>
  <line x1="320" y1="390" x2="356" y2="390" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#c)"/>
  <text x="372" y="398" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="17" fill="#0A0A0A"><tspan font-weight="700">Knowledge</tspan><tspan dx="14" fill="#78716C">an editable rule or constant</tspan></text>
</svg>
